syntax = "proto3";

package proto;

option go_package = "github.com/goppydae/gollm/extensions/gen";

service Extension {
  rpc Name(Empty) returns (NameResponse);
  rpc Tools(Empty) returns (ToolsResponse);
  rpc ExecuteTool(ExecuteToolRequest) returns (ExecuteToolResponse);
  rpc BeforePrompt(BeforePromptRequest) returns (BeforePromptResponse);
  rpc AfterToolCall(AfterToolCallRequest) returns (AfterToolCallResponse);
  rpc BeforeToolCall(BeforeToolCallRequest) returns (BeforeToolCallResponse);
  rpc ModifySystemPrompt(ModifySystemPromptRequest) returns (ModifySystemPromptResponse);

  rpc SessionStart(SessionStartRequest) returns (Empty);
  rpc SessionEnd(SessionEndRequest) returns (Empty);
  rpc AgentStart(Empty) returns (Empty);
  rpc AgentEnd(Empty) returns (Empty);
  rpc TurnStart(Empty) returns (Empty);
  rpc TurnEnd(Empty) returns (Empty);
  rpc ModifyInput(ModifyInputRequest) returns (ModifyInputResponse);
  rpc ModifyContext(ModifyContextRequest) returns (ModifyContextResponse);
  rpc BeforeProviderRequest(BeforeProviderRequestRequest) returns (BeforeProviderRequestResponse);
  rpc AfterProviderResponse(AfterProviderResponseRequest) returns (Empty);
  rpc BeforeCompact(BeforeCompactRequest) returns (BeforeCompactResponse);
  rpc AfterCompact(AfterCompactRequest) returns (Empty);
}

message Empty {}

message NameResponse {
  string name = 1;
}

message ToolDefinition {
  string name = 1;
  string description = 2;
  string parameters_json_schema = 3;
  bool is_read_only = 4;
}

message ToolsResponse {
  repeated ToolDefinition tools = 1;
}

message ExecuteToolRequest {
  string name = 1;
  string arguments_json = 2;
}

message ExecuteToolResponse {
  string content = 1;
  bool is_error = 2;
}

// Represents the state passed to BeforePrompt
message AgentState {
  string prompt = 1;
  string model = 2;
  string provider = 3;
  string thinking_level = 4;
}

message BeforePromptRequest {
  AgentState state = 1;
}

message BeforePromptResponse {
  AgentState state = 1;
}

message ToolCall {
  string name = 1;
  string arguments_json = 2;
}

message ToolResult {
  string output = 1;
  string error = 2;
}

message AfterToolCallRequest {
  ToolCall call = 1;
  ToolResult result = 2;
}

message AfterToolCallResponse {
  ToolResult result = 1;
}

message BeforeToolCallRequest {
  ToolCall call = 1;
}

message BeforeToolCallResponse {
  ToolResult result = 1;
  bool intercepted = 2;
}

message ModifySystemPromptRequest {
  string current_prompt = 1;
}

message ModifySystemPromptResponse {
  string modified_prompt = 1;
}

// Session lifecycle

message SessionStartRequest {
  string session_id = 1;
  string reason = 2;
}

message SessionEndRequest {
  string session_id = 1;
  string reason = 2;
}

// Input transformation

message ModifyInputRequest {
  string text = 1;
}

message ModifyInputResponse {
  // action: "continue" | "transform" | "handled"
  string action = 1;
  string text = 2;
}

// Context transformation (messages serialized as JSON array)

message ModifyContextRequest {
  string messages_json = 1;
}

message ModifyContextResponse {
  string messages_json = 1;
}

// Provider request/response

message BeforeProviderRequestRequest {
  string request_json = 1;
}

message BeforeProviderRequestResponse {
  string request_json = 1;
}

message AfterProviderResponseRequest {
  string content = 1;
  int32 num_tool_calls = 2;
}

// Compaction

message BeforeCompactRequest {
  int32 message_count = 1;
  int32 estimated_tokens = 2;
  string previous_summary = 3;
}

message BeforeCompactResponse {
  bool handled = 1;
  string summary = 2;
  string first_kept_entry_id = 3;
}

message AfterCompactRequest {
  int32 freed_tokens = 1;
}
