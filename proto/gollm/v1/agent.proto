syntax = "proto3";

package gollm.v1;

option go_package = "github.com/goppydae/gollm/internal/gen/gollm/v1;gollmv1";

// AgentService is the gollm gRPC interface.
// Each RPC carries a session_id identifying which agent instance to target.
// Sessions are auto-created on first use.
service AgentService {
  // Prompt sends a user message and streams back all agent events until idle.
  rpc Prompt(PromptRequest) returns (stream AgentEvent);

  // Steer injects a correction into a running turn.
  rpc Steer(SteerRequest) returns (SteerResponse);

  // Abort stops the current turn.
  rpc Abort(AbortRequest) returns (AbortResponse);

  // NewSession resets (or creates) a session.
  rpc NewSession(NewSessionRequest) returns (NewSessionResponse);

  // DeleteSession removes a session from the server.
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse);

  // ListSessions returns all active session IDs.
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);

  // GetState returns a snapshot of the agent state.
  rpc GetState(GetStateRequest) returns (GetStateResponse);

  // GetMessages returns the full conversation transcript.
  rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse);

  // ConfigureSession updates session-level settings.
  rpc ConfigureSession(ConfigureSessionRequest) returns (ConfigureSessionResponse);

  // SetModel sets the model name.
  rpc SetModel(SetModelRequest) returns (SetModelResponse);

  // SetThinkingLevel sets the thinking level.
  rpc SetThinkingLevel(SetThinkingLevelRequest) returns (SetThinkingLevelResponse);

  // SetSessionName sets a human-readable name for the session.
  rpc SetSessionName(SetSessionNameRequest) returns (SetSessionNameResponse);

  // Compact triggers manual context compaction.
  rpc Compact(CompactRequest) returns (CompactResponse);

  // BranchSession creates a new child session from an existing one at an optional message pivot.
  rpc BranchSession(BranchSessionRequest) returns (NewSessionResponse);

  // ForkSession duplicates an existing session into a new independent root (no parent link).
  rpc ForkSession(ForkSessionRequest) returns (NewSessionResponse);

  // RebaseSession creates a fresh-root session from a user-selected subset of messages.
  rpc RebaseSession(RebaseSessionRequest) returns (NewSessionResponse);

  // MergeSession synthesizes two branches into a new session via LLM.
  rpc MergeSession(MergeSessionRequest) returns (NewSessionResponse);

  // GetSessionTree returns the hierarchical tree of sessions.
  rpc GetSessionTree(GetSessionTreeRequest) returns (GetSessionTreeResponse);

  // FollowUp queues a follow-up message to be processed after the current turn finishes.
  rpc FollowUp(FollowUpRequest) returns (FollowUpResponse);

  // StreamEvents opens a long-lived stream for all agent events (heartbeats, state changes, etc.).
  rpc StreamEvents(StreamEventsRequest) returns (stream AgentEvent);
}

// ── Requests ──────────────────────────────────────────────────────────────────

message PromptRequest {
  string session_id = 1;
  string message    = 2;
  repeated ImageAttachment images = 3;
}

message ConfigureSessionRequest {
  string session_id      = 1;
  optional string model  = 2;
  optional string thinking_level = 3;
  optional string system_prompt  = 4;
  optional bool dry_run  = 5;
  optional CompactionConfig compaction = 6;
  optional string provider = 7;
}

message CompactionConfig {
  bool enabled            = 1;
  int32 reserve_tokens    = 2;
  int32 keep_recent_tokens = 3;
}

message ImageAttachment {
  string mime_type = 1;
  string data      = 2; // base64-encoded
}

message SteerRequest            { string session_id = 1; string message = 2; }
message AbortRequest            { string session_id = 1; }
message NewSessionRequest       { string session_id = 1; string name = 2; }
message DeleteSessionRequest    { string session_id = 1; }
message ListSessionsRequest     {}
message GetStateRequest         { string session_id = 1; }
message GetMessagesRequest      { string session_id = 1; }
message SetModelRequest         { string session_id = 1; string model = 2; }
message SetThinkingLevelRequest { string session_id = 1; string thinking_level = 2; }
message SetSessionNameRequest   { string session_id = 1; string name = 2; }
message CompactRequest          { string session_id = 1; }
message BranchSessionRequest {
  string session_id    = 1;
  int32  message_index = 2;  // -1 = branch at current end (all messages)
  string target_id     = 3;  // record ID to branch from (overrides message_index if set)
}

message ForkSessionRequest { string session_id = 1; }

message RebaseSessionRequest {
  string         session_id  = 1;
  repeated int32 msg_indices = 2;  // message indices to keep (in order)
  bool           squash      = 3;  // if true, LLM condenses selected msgs before saving
}

message MergeSessionRequest {
  string session_id_a = 1;  // primary parent
  string session_id_b = 2;  // secondary (merge source)
}
message GetSessionTreeRequest {
  string session_id = 1;
  enum Scope {
    SESSION = 0;
    PROJECT = 1;
    GLOBAL  = 2;
  }
  Scope scope = 2;
}
message FollowUpRequest {
  string session_id = 1;
  string message    = 2;
  repeated ImageAttachment images = 3;
}
message StreamEventsRequest {
  string session_id = 1;
}

message GetSessionTreeResponse {
  repeated SessionNode roots = 1;
}

message SessionNode {
  string session_id = 1;
  string name       = 2;
  repeated SessionNode children = 3;
  string first_message         = 4;
  int64  created_at            = 5;
  int64  updated_at            = 6;
  int32  parent_message_index  = 7;  // -1 if not a mid-branch pivot
  string merge_source_id       = 8;  // non-empty on merge nodes
  string role                  = 9;
  string content               = 10;
  bool   is_active             = 11;
}

// ── Responses ─────────────────────────────────────────────────────────────────

message SteerResponse               { bool ok = 1; }
message AbortResponse               { bool ok = 1; }
message DeleteSessionResponse       { bool ok = 1; }
message SetModelResponse            { bool ok = 1; }
message SetThinkingLevelResponse    { bool ok = 1; }
message SetSessionNameResponse      { bool ok = 1; }
message CompactResponse             { bool ok = 1; }
message ConfigureSessionResponse    { bool ok = 1; }
message FollowUpResponse            { bool ok = 1; }

message NewSessionResponse { string session_id = 1; }

message ListSessionsResponse { repeated SessionSummary sessions = 1; }

message SessionSummary {
  string session_id  = 1;
  string name        = 2;
  string description = 3;
  string lifecycle   = 4;
  int64  created_at  = 5;
  int64  updated_at  = 6;
}

message GetStateResponse {
  string session_id     = 1;
  string model          = 2;
  string provider       = 3;
  string thinking_level = 4;
  string lifecycle      = 5;
  int32  message_count  = 6;
  string system_prompt  = 7;
  bool   dry_run        = 8;
  CompactionConfig compaction = 9;
  ProviderInfo provider_info = 10;
  // Lineage (informational only)
  string rebased_from        = 11;
  string merge_source_id     = 12;
  int32  parent_message_index = 13;  // -1 if N/A
}

message ProviderInfo {
  string name           = 1;
  string model          = 2;
  int32  context_window = 3;
  bool   supports_images = 4;
  bool   supports_tools  = 5;
}

message GetMessagesResponse { repeated ConversationMessage messages = 1; }

message ToolCallProto {
  string id        = 1;
  string name      = 2;
  string args_json = 3;
}

message ConversationMessage {
  string role         = 1;
  string content      = 2;
  int64  timestamp    = 3; // unix millis
  string thinking     = 4;
  repeated ToolCallProto tool_calls = 5;
  string tool_call_id = 6;
}

// ── Streaming event (server → client) ─────────────────────────────────────────

// AgentEvent is the union of every event the agent can emit.
// Exactly one payload field is set per message.
message AgentEvent {
  string session_id = 1;

  oneof payload {
    AgentStartEvent    agent_start    =  2;
    TurnStartEvent     turn_start     =  3;
    MessageStartEvent  message_start  =  4;
    TextDeltaEvent     text_delta     =  5;
    ThinkingDeltaEvent thinking_delta =  6;
    ToolCallEvent      tool_call      =  7;
    ToolDeltaEvent     tool_delta     =  8;
    ToolOutputEvent    tool_output    =  9;
    MessageEndEvent    message_end    = 10;
    AgentEndEvent      agent_end      = 11;
    ErrorEvent         error          = 12;
    AbortEvent         abort          = 13;
    StateChangeEvent   state_change   = 14;
    TokensEvent        tokens         = 15;
    HeartbeatEvent     heartbeat      = 16;
    CompactStartEvent  compact_start  = 17;
    CompactEndEvent    compact_end    = 18;
    QueueUpdateEvent   queue_update   = 19;
  }
}

message AgentStartEvent    {}
message TurnStartEvent     {}
message MessageStartEvent  {}
message AgentEndEvent      {}
message AbortEvent         {}
message QueueUpdateEvent   {}
message CompactEndEvent    { string message = 1; }

message TextDeltaEvent     { string content = 1; }
message ThinkingDeltaEvent { string content = 1; }

message ToolCallEvent {
  string id        = 1;
  string name      = 2;
  string args_json = 3;
  int32  position  = 4;
}

message ToolDeltaEvent {
  string content      = 1;
  string tool_call_id = 2;
}

message ToolOutputEvent {
  string tool_call_id = 1;
  string tool_name    = 2;
  string content      = 3;
  bool   is_error     = 4;
}

message MessageEndEvent {
  int32 prompt_tokens     = 1;
  int32 completion_tokens = 2;
  int32 total_tokens      = 3;
}

message ErrorEvent       { string message = 1; }
message StateChangeEvent { string from = 1; string to = 2; }
message TokensEvent      { int64 value = 1; }

message HeartbeatEvent {
  int64  timestamp = 1;
  string lifecycle = 2;
}

message CompactStartEvent { string message = 1; }
