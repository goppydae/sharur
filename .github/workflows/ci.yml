name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  full-build-and-test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout Workspace
        uses: actions/checkout@v4

      - name: Synchronize Environment (Nix)
        uses: cachix/install-nix-action@v24
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Full Build and Verification
        # mage all: generate → build → test (with coverage) → vet → lint → vuln
        # coverage.out is written by the Test() mage target for the next steps.
        run: nix develop -c mage all

      - name: Coverage Summary
        run: nix develop -c go tool cover -func=coverage.out

      - name: Enforce Coverage Threshold
        run: |
          COVERAGE=$(nix develop -c go tool cover -func=coverage.out | grep "^total" | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 40" | bc -l)" = "1" ]; then
            echo "Coverage ${COVERAGE}% is below the 40% threshold."
            exit 1
          fi

      - name: Upload Coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          fail_ci_if_error: false

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: glm-${{ matrix.os }}
          path: glm
          retention-days: 7
